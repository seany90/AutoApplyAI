<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 320px;
      padding: 20px;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #0f172a;
      color: #f8fafc;
      margin: 0;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
      border-bottom: 1px solid #1e293b;
      padding-bottom: 16px;
    }
    .header img {
      width: 32px;
      height: 32px;
      border-radius: 8px;
    }
    .header h2 {
      font-size: 18px;
      margin: 0;
      color: #818cf8;
      font-weight: 700;
      letter-spacing: -0.025em;
    }
    .field {
      margin-bottom: 20px;
    }
    label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: #94a3b8;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    input, textarea {
      width: 100%;
      background-color: #1e293b;
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 10px;
      color: white;
      font-size: 13px;
      box-sizing: border-box;
      transition: all 0.2s;
    }
    input:focus, textarea:focus {
      outline: none;
      border-color: #4f46e5;
      background-color: #0f172a;
      box-shadow: 0 0 0 2px rgba(79, 70, 229, 0.2);
    }
    textarea {
      height: 140px;
      resize: none;
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
    }
    button {
      width: 100%;
      background-color: #4f46e5;
      color: white;
      border: none;
      padding: 12px;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 14px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
    }
    button:hover {
      background-color: #4338ca;
      transform: translateY(-1px);
    }
    button:active {
      transform: translateY(0);
    }
    .status {
      font-size: 12px;
      margin-top: 16px;
      text-align: center;
      color: #64748b;
      min-height: 18px;
    }
    .success {
      color: #10b981;
    }
    .error {
      color: #ef4444;
    }
  </style>
</head>
<body>
  <div class="header">
    <img src="icon.png" alt="AutoApply AI">
    <h2>AutoApply AI</h2>
  </div>
  
  <div class="field">
    <label>Gemini API Key</label>
    <input type="password" id="apiKey" placeholder="Paste your API key here...">
  </div>
  
  <div class="field">
    <label>Profile Data (JSON)</label>
    <textarea id="profile" placeholder='{
  "fullName": "John Doe",
  "experience": [...]
}'></textarea>
  </div>
  
  <button id="saveBtn">Save & Sync Settings</button>
  
  <div id="status" class="status"></div>

  <script src="popup.js"></script>
</body>
</html>
