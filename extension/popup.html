<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      width: 320px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: #0f172a;
      color: #f8fafc;
    }
    h2 {
      font-size: 18px;
      margin-top: 0;
      color: #818cf8;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .field {
      margin-bottom: 16px;
    }
    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #94a3b8;
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    input, textarea {
      width: 100%;
      background-color: #1e293b;
      border: 1px solid #334155;
      border-radius: 6px;
      padding: 8px;
      color: white;
      font-size: 13px;
      box-sizing: border-box;
    }
    textarea {
      height: 120px;
      resize: none;
    }
    button {
      width: 100%;
      background-color: #4f46e5;
      color: white;
      border: none;
      padding: 10px;
      border-radius: 6px;
      font-weight: 600;
      cursor: pointer;
      transition: background-color 0.2s;
    }
    button:hover {
      background-color: #4338ca;
    }
    .status {
      font-size: 11px;
      margin-top: 12px;
      text-align: center;
      color: #64748b;
    }
    .success {
      color: #10b981;
    }
  </style>
</head>
<body>
  <h2>✨ Auto-Apply AI</h2>
  
  <div class="field">
    <label>Gemini API Key</label>
    <input type="password" id="apiKey" placeholder="Enter your API key...">
  </div>
  
  <div class="field">
    <label>Source of Truth Profile (JSON)</label>
    <textarea id="profile" placeholder='{"fullName": "John Doe", ...}'></textarea>
  </div>
  
  <button id="saveBtn">Save & Sync</button>
  
  <div id="status" class="status">Settings saved locally.</div>

  <script src="popup.js"></script>
</body>
</html>
